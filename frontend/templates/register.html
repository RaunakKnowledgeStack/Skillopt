{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<section class="form-card">
  <div class="card form-shell">
    <h1 class="form-title">Create your account</h1>
    <p class="form-sub">Join as a client or freelancer and start using AI job insights.</p>
    <form method="post">
      <div class="form-group">
        <label for="name">Full name</label>
        <input id="name" type="text" name="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" name="email" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" required />
      </div>
      <div class="form-group">
        <label for="security_question">Security question</label>
        <select id="security_question" name="security_question" required>
          <option value="">Choose one</option>
          <option value="What is your favorite color?">What is your favorite color?</option>
          <option value="What city were you born in?">What city were you born in?</option>
          <option value="What was the name of your first pet?">What was the name of your first pet?</option>
        </select>
      </div>
      <div class="form-group">
        <label for="security_answer">Security answer</label>
        <input id="security_answer" type="text" name="security_answer" required />
      </div>
      <div class="form-group">
        <label>Choose role</label>
        <div class="role-select">
          <label class="role-option">
            <input type="radio" name="role" value="client" checked />
            <div class="icon">Brief</div>
            <div class="role-name">Client</div>
            <div class="role-desc">Post jobs and review proposals.</div>
          </label>
          <label class="role-option">
            <input type="radio" name="role" value="freelancer" />
            <div class="icon">Work</div>
            <div class="role-name">Freelancer</div>
            <div class="role-desc">Apply to jobs and message clients.</div>
          </label>
        </div>
      </div>
      <button class="btn btn-primary btn-sm" type="submit">Create account</button>
    </form>
    <p class="form-sub" style="margin-top:16px;">Already registered? <a href="{{ url_for('login') }}">Login</a></p>
  </div>
</section>
{% endblock %}
