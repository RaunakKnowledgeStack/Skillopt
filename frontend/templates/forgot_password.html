{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<section class="form-card">
  <div class="card form-shell">
    <h1 class="form-title">Reset password</h1>
    <p class="form-sub">Answer your security question to set a new password.</p>

    {% if step == 'email' %}
      <form method="post">
        <input type="hidden" name="step" value="email" />
        <div class="form-group">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" value="{{ email }}" required />
        </div>
        <button class="btn btn-primary btn-sm" type="submit">Continue</button>
      </form>
    {% else %}
      <form method="post">
        <input type="hidden" name="step" value="reset" />
        <input type="hidden" name="email" value="{{ email }}" />
        <div class="form-group">
          <label>Security question</label>
          <div class="card" style="padding:14px 16px;background:var(--surface-2);box-shadow:none;">{{ user.security_question }}</div>
        </div>
        <div class="form-group">
          <label for="security_answer">Answer</label>
          <input id="security_answer" type="text" name="security_answer" required />
        </div>
        <div class="form-group">
          <label for="new_password">New password</label>
          <input id="new_password" type="password" name="new_password" required />
        </div>
        <div class="form-group">
          <label for="confirm_password">Confirm password</label>
          <input id="confirm_password" type="password" name="confirm_password" required />
        </div>
        <div class="action-row" style="justify-content:space-between;">
          <button class="btn btn-primary btn-sm" type="submit">Save password</button>
          <a href="{{ url_for('forgot_password') }}">Start over</a>
        </div>
      </form>
    {% endif %}

    <p class="form-sub" style="margin-top:16px;">Back to <a href="{{ url_for('login') }}">login</a></p>
  </div>
</section>
{% endblock %}
